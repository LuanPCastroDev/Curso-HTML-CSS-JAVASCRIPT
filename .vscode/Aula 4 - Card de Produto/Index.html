<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card de Produto</title>
    <link rel="stylesheet" href="CSS/style.css" />
  </head>
  <body>
    <div class="card">
      <img
        src="imagens/Tenis Nike.jpg"
        alt="tênis nike"
        class="card-img"
        width="250"
        height="200"
      />
      <div>
        <div class="flex">
          <h1>Nike Flair</h1>
          <h1>R$ 500,00</h1>
        </div>
        <p>Tênis Nike Pro</p>
        <div class="flex flex-end">
          <button class="botaosecundario">Adicionar ao carrinho</button>
          <button class="botaoprimario">Comprar agora</button>
        </div>
      </div>
    </div>
  </body>
</html>
